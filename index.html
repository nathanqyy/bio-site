<style>
body {
    margin: 0;
    min-height: 100vh; /* Alterado de height para min-height */
    overflow-x: hidden; /* Esconde rolagem horizontal */
    overflow-y: auto; /* Permite rolar para baixo no celular se necessário */
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0d0d10);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    gap: 20px;
    padding: 20px; /* Adiciona um respiro nas bordas da tela */
    box-sizing: border-box;
}

/* PARTICLES */
#tsparticles {
    position: fixed;
    inset: 0;
    z-index: 0;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    cursor: pointer;
    font-size: 18px;
    letter-spacing: 1px;
}

/* CARD */
.card {
    position: relative;
    z-index: 2;
    width: 100%; /* Ocupa a largura disponível... */
    max-width: 360px; /* ...mas não passa de 360px em telas grandes */
    box-sizing: border-box; /* Garante que o padding não aumente o tamanho total do card */
    padding: 22px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 0 25px rgba(168,85,247,0.15), 0 0 60px rgba(255,115,250,0.08);
    transform: translateY(15px);
    opacity: 0;
    transition: .6s;
}

.card.show {
    transform: translateY(0);
    opacity: 1;
}

.top {
    display: flex;
    gap: 15px;
    align-items: center;
}

.avatar-wrapper {
    position: relative;
    width: 82px;
    height: 82px;
}

.avatar {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
}

.status {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    position: absolute;
    bottom: 4px;
    right: 4px;
    border: 3px solid #0d0d10;
}

.online { background: #23a559; }
.idle { background: #f0b232; }
.dnd { background: #f23f43; }
.offline { background: #80848e; }

.name { font-size: 20px; font-weight: 700; }
.username { color: #b5bac1; font-size: 13px; margin-top: 2px; }

.section {
    margin-top: 14px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
}

.spotify {
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.spotify img {
    width: 58px;
    height: 58px;
    border-radius: 10px;
}

.custom-status {
    margin-top: 6px;
    font-size: 13px;
    color: #cfcfcf;
}

/* --- REGRAS PARA CELULAR (RESPONSIVIDADE) --- */
@media (max-width: 768px) {
    body {
        flex-direction: column; /* Empilha os cards um em cima do outro */
        padding: 40px 20px; /* Dá mais espaço no topo e embaixo no celular */
    }
}
</style>
