<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suano bios</title>

<link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1506850010866651229/1512318266180239411/nadekotrace.png?ex=6a23a7a4&is=6a225624&hm=2971120fb1613e7ce75cda22184f95237f849d27e5acf78c6a36ce81ff54479e&">

<style>
body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0d0d10);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    gap: 20px;
    padding: 20px;
    box-sizing: border-box;
    
    /* 👇 CURSOR GERAL DO SITE 👇 */
    cursor: url('https://cdn.discordapp.com/attachments/1506850010866651229/1512326728582692984/cursor_seta.png?ex=6a23af85&is=6a225e05&hm=09b08ac48b2aa4f786de3184881f63e61a31aaeb4dbac5f141d0d279ddd74cd9&'), auto;
}

/* PARTICLES */
#tsparticles {
    position: fixed;
    inset: 0;
    z-index: 0;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    
    /* 👇 CURSOR PARA A TELA DE ENTRADA 👇 */
    cursor: url('https://cdn.discordapp.com/attachments/1506850010866651229/1512326728847196353/cursor_kitty.png?ex=6a23af85&is=6a225e05&hm=bf396e3464f29f505a9efa7bfcf6d7f83d0aacda7aad7258bbf141034b69b5d6&'), pointer;
    font-size: 18px;
    letter-spacing: 1px;
}

/* CARD */
.card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 360px;
    box-sizing: border-box;
    padding: 22px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 0 25px rgba(168,85,247,0.15), 0 0 60px rgba(255,115,250,0.08);
    transform: translateY(15px);
    opacity: 0;
    transition: .6s;
}

.card.show {
    transform: translateY(0);
    opacity: 1;
}

.top {
    display: flex;
    gap: 15px;
    align-items: center;
}

.avatar-wrapper {
    position: relative;
    width: 82px;
    height: 82px;
}

.avatar {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
}

.status {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    position: absolute;
    bottom: 4px;
    right: 4px;
    border: 3px solid #0d0d10;
}

.online { background: #23a559; }
.idle { background: #f0b232; }
.dnd { background: #f23f43; }
.offline { background: #80848e; }

.name { font-size: 20px; font-weight: 700; }
.username { color: #b5bac1; font-size: 13px; margin-top: 2px; }

.section {
    margin-top: 14px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
}

.spotify {
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.spotify img {
    width: 58px;
    height: 58px;
    border-radius: 10px;
}

.custom-status {
    margin-top: 6px;
    font-size: 13px;
    color: #cfcfcf;
}


.site-title {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-size: 58px;
    font-weight: 900;
    letter-spacing: 5px;
    color: #ffd1e8;
    text-shadow:
        0 0 8px #ffd1e8,
        0 0 16px #ffb6d9,
        0 0 32px #ff9fd0,
        0 0 64px #ff9fd0;
}

/* RESPONSIVIDADE PARA CELULAR */
@media (max-width: 768px) {
    body {
        flex-direction: column;
        padding: 40px 20px;
    }
}
</style>
</head>
<p style="position:fixed;bottom:10px">Todos os direitos autorais para WZN <3 .</p> 
<body>

<div id="tsparticles"></div>

<div class="site-title">SUANA BIOS</div>

<audio id="music" loop preload="auto">
<source src="https://cdn.discordapp.com/attachments/1506850010866651229/1512329736062500894/Incrysis_-_Cain_-_Cain_youtube.mp3?ex=6a245b12&is=6a230992&hm=c70e6b553c8a1e4c478236838967372bbfbf6f7e62576c377789a9f84965adde&">
</audio>

<div id="overlay">Clique para entrar</div>

<div class="card" id="card1"></div>
<div class="card" id="card2"></div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
// 1. ISOLANDO O BOTÃO DE CLIQUE
var overlay = document.getElementById("overlay");
var music = document.getElementById("music");

overlay.addEventListener("click", function() {
    overlay.style.display = "none";
    
    var cards = document.querySelectorAll(".card");
    for(var i = 0; i < cards.length; i++) {
        cards[i].classList.add("show");
    }

    try {
        music.volume = 0.3;
        var playPromise = music.play();
        if (playPromise !== undefined) {
            playPromise.catch(function() {
                console.log("Navegador bloqueou a música ou o link falhou.");
            });
        }
    } catch(e) {}
});

// 2. PARTICULAS (MANTIDAS COMO ORIGINAL)
try {
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 60 },
            color: { value: "#ffffff" },
            opacity: { value: 0.35 },
            size: { value: 2 },
            move: { enable: true, speed: 0.6 },
            links: { enable: true, color: "#ffffff", opacity: 0.12 }
        }
    });
} catch(e) { console.log("Erro nas partículas"); }

// 3. COMUNICAÇÃO COM O DISCORD
function createSocket(USER_ID, elementId){
    var el = document.getElementById(elementId);
    var socket = new WebSocket("wss://api.lanyard.rest/socket");

    socket.onopen = function() {
        socket.send(JSON.stringify({
            op: 2,
            d: { subscribe_to_id: USER_ID }
        }));
    };

    socket.onmessage = function(event) {
        var msg = JSON.parse(event.data);
        if(!msg.d) return;

        var data = msg.d;
        var user = data.discord_user;

        var custom = null;
        var activity = null;

        if (data.activities) {
            custom = data.activities.find(function(a) { return a.type === 4; });
            activity = data.activities.find(function(a) { return a.type === 0; });
        }

        var spotifyDisplay = data.listening_to_spotify ? "display:flex" : "display:none";
        var spotifyAlbum = (data.spotify && data.spotify.album_art_url) ? data.spotify.album_art_url : "";
        var spotifySong = (data.spotify && data.spotify.song) ? data.spotify.song : "";
        var spotifyArtist = (data.spotify && data.spotify.artist) ? data.spotify.artist : "";

        el.innerHTML = `
            <div class="top">
                <div class="avatar-wrapper">
                    <img class="avatar" src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=512">
                    <div class="status ${data.discord_status}"></div>
                </div>

                <div>
                    <div class="name">${user.global_name || user.username}</div>
                    <div class="username">@${user.username}</div>
                    <div class="custom-status">${custom ? "💬 " + custom.state : ""}</div>
                </div>
            </div>

            <div class="section">
                <strong>Atividade</strong>
                <div>${activity ? "🎮 " + activity.name : "Sem atividade"}</div>
            </div>

            <div class="section spotify" style="${spotifyDisplay}">
                <img src="${spotifyAlbum}">
                <div>
                    <div>${spotifySong}</div>
                    <div style="color:#b5bac1;font-size:13px;">
                        ${spotifyArtist}
                    </div>
                </div>
            </div>
        `;
    };
}

createSocket("1488851794670125128", "card1");
createSocket("1274361628426502215", "card2");
</script>

</body>
</html>
